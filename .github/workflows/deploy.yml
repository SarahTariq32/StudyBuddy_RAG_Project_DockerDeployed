name: Continuous Delivery

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed

jobs:
  deliver-docker-artifacts:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -t studybuddy-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t studybuddy-frontend:latest ./frontend

      - name: Export backend Docker image
        run: docker save studybuddy-backend:latest -o studybuddy-backend.tar

      - name: Export frontend Docker image
        run: docker save studybuddy-frontend:latest -o studybuddy-frontend.tar

      - name: Upload backend Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-backend-image
          path: studybuddy-backend.tar

      - name: Upload frontend Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-frontend-image
          path: studybuddy-frontend.tar

      - name: Upload Docker Compose delivery file
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-docker-compose
          path: docker-compose.yml
